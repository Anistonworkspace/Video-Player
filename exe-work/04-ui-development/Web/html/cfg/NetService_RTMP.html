				<div class="cfg_row_right">
					<div class="selectDisable" id="RTMPSwitch" data='0'></div>
				</div>
			</div>         
			<div class="cfg_row" id="DirectoryBox">

            <div class="cfg_row" id="rtmpStreamTypeBox">

    <div class="cfg_row" style="float: right;">
        <div class="btn_box" id="RTMP_btn_box">
			<button id="RTMPRf" class="btn">Refresh</button>
