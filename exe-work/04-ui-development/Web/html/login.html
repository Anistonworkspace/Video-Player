<div class="authWrap">
	<div class="authLeft">
		<div class="authCard">
			<div class="authBrand">
				<img class="authBrandLogo" src="LoginTopLogo.png" alt="AnistonCam"/>
				<span class="authBrandName">AnistonCam</span>
			</div>
			<div class="login_main" style="display:none">
				<div class="loginDiv" id="loginDiv">
					<div class="loginLogoBg">
						<div class="loginLogo" id="LoginTitle" style="display: block;"></div>
					</div>
					<p class="authSub">Please enter your details</p>
					<div class="enterBox" id="idLogin_InputDiv" style="display: block;">
						<label class="fieldLabel">User Name</label>
						<div class="login_box" id="uName">
							<div class="spanImg" oriTop="0"></div>
							<input class="login_input" id="userName" type="text" value="" placeholder="Enter your user name"/>
						</div>
						<label class="fieldLabel">Password</label>
						<div class="login_box" id="pwd">
							<div class="spanImg" oriTop="32"></div>
							<input class="login_input PswEyeShow" id="loginPsw" type="text" value="" placeholder="Enter your password" autocomplete="off"/>
							<div class="psw_eye_arc">
								<div class="psw_eye_cicle"></div>
							</div>
						</div>
						<div class="loginPswCkbox_div" id="loginPswCkbox_div">
							<span id="DownloadDiv" style="float:left;display:none;" >
								<a id="DownloadLink">Download</a>
							</span>
							<span id="ForgetPwdDiv" style="display: none;float:right">
								<a id="ForgetPwd">Forget Password</a>
							</span>
						</div>
						<div class="LoginStatus" id="LoginStatus">
							<div style="float:left;"> </div>
							<div id="Web_false"></div>
						</div>
						<div class="login_box" id="loginBtn" name="">Login</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<div class="authArt">
		<div class="authArtInner">
			<img class="authArtLogo" src="LoginTopLogo.png" alt=""/>
			<div class="authArtTitle">AnistonCam</div>
			<div class="authArtDesc">Secure camera management console</div>
		</div>
	</div>
</div>
