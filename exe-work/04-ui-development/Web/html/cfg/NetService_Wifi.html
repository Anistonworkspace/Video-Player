<div class="cfg_container">
	<div class="cfg_row">
		<div class="cfg_row_left" id="Enable">Enable</div>
		<div class="cfg_row_right">
			<div id="SwitchEnable" class="selectDisable" data="0"></div>
		</div>
	</div>

	<div id="CfgBox">
		<div class="cfg_row" id="DHCPBox">
			<div class="cfg_row_left" id="NetDHCP">DHCP</div>
			<div class="cfg_row_right">
				<div id="SwitchDHCP" class="selectDisable" data="0"></div>
			</div>
		</div>
		<div class="cfg_row">
			<div class="cfg_row_left" id="SSID">SSID</div>
			<div class="cfg_row_right">
				<input id="InputSSID" class="inputTxt" readonly="readonly"/>
			</div>
		</div>
		
		<div class="cfg_row" id="EncrypTypeBox" style="display: none;">
			<div class="cfg_row_left" id="EncrypType">Encryption</div>
			<div class="cfg_row_right">
				<input id="InputEncrypType" class="inputTxt" readonly="readonly"/>
			</div>
		</div>
		
		<div class="cfg_row" id="KeyTypeBox">
			<div class="cfg_row_left" id="KeyType">Key Type</div>
			<div class="cfg_row_right">
				<select id="SelKeyType" class="select"></select>
			</div>
		</div>
		
		<div class="cfg_row" id="PasswordBox">
			<div class="cfg_row_left" id="Password">Password</div>
			<div class="cfg_row_right">
				<input id="InputPassword" class="inputTxt" type="text"/>
			</div>
		</div>
		
		<div id="DhcpCtrlBox">
			<div class="cfg_row" id="IpAddressBox">
				<div class="cfg_row_left" id="IpAddress">IP Address</div>
				<div class="cfg_row_right">
					<input type="text" id="InputIpAddress" class="inputTxt"  onblur="LimitIP(this);" onkeyup="if(keyboardFilter(event)) {LimitIP(this);}"/>
				</div>
			</div>
			
			<div class="cfg_row" id="SubnetMaskBox">
				<div class="cfg_row_left" id="SubnetMask">Subnet Mask</div>
				<div class="cfg_row_right">
					<input id="InputSubnetMask" class="inputTxt" onblur="LimitIP(this);" onkeyup="if(keyboardFilter(event)) {LimitIP(this);}"/>
				</div>
			</div>
			
			<div class="cfg_row" id="GatewayBox">
				<div class="cfg_row_left" id="Gateway">Gateway</div>
				<div class="cfg_row_right">
					<input id="InputGateway" class="inputTxt" onblur="LimitIP(this);" onkeyup="if(keyboardFilter(event)) {LimitIP(this);}"/>
				</div>
			</div>
		</div>
	</div>

	<div class="cfg_row"></div>
	<div style="width: 100%; height: 130px;">
		<div id="WifiList">
			<div class="table-responsive">
				<div class="table-head">
					<table class="table grid" style="margin-bottom:0">
						<colgroup>
							<col style="width:30%">
							<col style="width:30%">
							<col style="width:40%">
						</colgroup>
						<thead>
							<tr>
								<th id="Head_SSID"></th>
								<th id="Head_RSSI"></th>
								<th id="Head_Auth"></th>
							</tr>
						</thead>
					</table>
			    </div>
			    <div class="table-content">
					<table id="WifiTable" class="table grid">
						<colgroup>
							<col style="width:30%">
							<col style="width:30%">
							<col style="width:40%">
						</colgroup>
						<tbody>
						</tbody>
					</table>
			    </div>
			</div>
		</div>
	</div>

	<div class="cfg_row">
		<div class="btn_box">
			<button id="BtnSreach" class="btn SvBtnState">Sreach</button>
			<button id="BtnRf" class="btn">Refresh</button>
			<button id="BtnSave" class="btn SvBtnState">Save</button>
		</div>
	</div>
</div>
