<div class="cfg_container">
	<div class="cfg_row">
		<div class="cfg_row_left" id="Enable">Enable</div>
		<div class="cfg_row_right">
			<div id="EnableSwitch" class="selectDisable" data="0"></div>
		</div>
	</div>
	
	<div id="DASDivBox">
		<div class="cfg_row">
			<div class="cfg_row_left" id="SerialNumber">Serial Number</div>
			<div class="cfg_row_right">
				<input id="InputSerialNum" class="inputTxt"/>
			</div>
		</div>
		
		<div class="cfg_row">
			<div class="cfg_row_left" id="ServerName">Server Address</div>
			<div class="cfg_row_right">
				<input id="InputServerName" class="inputTxt"/>
			</div>
		</div>
		
		<div class="cfg_row">
			<div class="cfg_row_left" id="ServerPort">Server Port</div>
			<div class="cfg_row_right">
				<input id="InputSererPort" class="inputTxt"/>
			</div>
		</div>
		
		<div class="cfg_row">
			<div class="cfg_row_left" id="UserName">UserName</div>
			<div class="cfg_row_right">
				<input id="InputUserName" class="inputTxt"/>
			</div>
		</div>
		
		<div class="cfg_row">
			<div class="cfg_row_left" id="Password">Password</div>
			<div class="cfg_row_right">
				<div class="cfg_row_pwd">
					<input id="InputPassword" class="inputTxt PswEyeShow" type="text" maxlength="31"/>
					<div class="psw_eye_arc">
						<div class="psw_eye_cicle"></div>
					</div>
				</div>
			</div>
		</div>
	</div>
	
	<div class="cfg_row">
	    <div class="btn_box">
			<button id="DASRf" class="btn">Cancel</button>
	        <button id="DASSV" class="btn SvBtnState">Save</button>
	    </div>
	</div>
</div>
