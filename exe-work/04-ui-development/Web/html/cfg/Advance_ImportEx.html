<div class="cfg_container">
	<div id="CfgImExDiv" style="margin-top: 20px;">
		<h3 id="ConfigImExTitle">Config IM/EX</h3>
		<div class="ImportExportBox">
			<button class="btn SvBtnState ImExBtn" id="ImportCfg"></button>
			<button class="btn SvBtnState ImExBtn" id="ExportCfg"></button>
		</div>
		<h3 id="DevLogExTitle" style="margin-top:90px;">Device Log Export</h3>
		<div class="ImportExportBox">
			<button class="btn SvBtnState ImExBtn" id="ExportDevLog"></button>
		</div>
		<h3 id="LogImExTitle" style="margin-top:90px;display:none">IPC Log Export</h3>
		<div class="ImportExportBox" style="display:none" id="IPCLogExportDiv">
			<div id="IPCLogChannelDiv" style="display:none;width: 450px"></div>
			<div id="SelectAll_CheckBox" style="display:none;float:left;width:100%;height:20px;margin-top:5px;">
				<span>
					<input type="checkbox" id="SelectAll_Check" />
					<label for="SelectAll_Check" id="SelectAllL" style="font-size: 13px;">全选</label>
				</span>
			</div>
			<button class="btn SvBtnState ImExBtn" id="ExportIPCLog"></button>
		</div>
		<input type="file" id="InputFileChoose" accept=".cfg" style="display: none;" />
	</div>
</div>
